version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_tts: ^3.8.5
  cupertino_icons: ^1.0.8
  http: ^1.3.0
  flutter_bloc: ^9.1.0
  go_router: ^15.0.0
